version: "2"

linters:
  # Standard set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Costroid/costroid
  exclusions:
    generated: lax
