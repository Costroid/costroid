name: CI

on:
  push:
  pull_request:

jobs:
  pre-pr:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  focus-conformance:
    name: FOCUS 1.3 validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focus-validator
        run: python -m pip install focus-validator

      # Exports the committed fixtures to FOCUS CSV and runs the official
      # validator (offline, bundled 1.3 ruleset) against the documented
      # known-failure allowlist. Guards against conformance regressions.
      - name: Validate FOCUS export
        env:
          FOCUS_VALIDATOR_PYTHON: python
        run: bash scripts/focus_conformance.sh

  license:
    name: license + supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enforces the Apache-2.0 / no-copyleft policy and the "rustls, never
      # OpenSSL" rule from deny.toml. licenses + bans are fully offline (no
      # RustSec advisory-DB fetch), keeping the gate network-free.
      - name: cargo-deny (licenses + bans)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans

  offline-acceptance:
    name: offline acceptance (Phase-1 capstone)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # strace is the authoritative network-isolation mechanism; script/unshare
      # (util-linux) and python3 are preinstalled on ubuntu runners.
      - name: Install strace
        run: sudo apt-get update && sudo apt-get install -y strace

      # Static proof: no networking/telemetry crate is even linked.
      - name: Static no-network/no-telemetry dependency proof
        run: cargo test -p costroid --test offline -- --nocapture

      # Dynamic proof: run every command with networking fully disabled against
      # committed fixtures, asserting no outbound IP traffic is attempted.
      - name: Offline acceptance harness (networking disabled)
        run: bash scripts/offline_acceptance.sh
