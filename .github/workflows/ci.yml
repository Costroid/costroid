name: CI

on:
  push:
  pull_request:

jobs:
  pre-pr:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  focus-conformance:
    name: FOCUS 1.3 validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focus-validator
        run: python -m pip install focus-validator

      # Exports the committed fixtures to FOCUS CSV and runs the official
      # validator (offline, bundled 1.3 ruleset) against the documented
      # known-failure allowlist. Guards against conformance regressions.
      - name: Validate FOCUS export
        env:
          FOCUS_VALIDATOR_PYTHON: python
        run: bash scripts/focus_conformance.sh
