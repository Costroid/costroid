name: CI

on:
  push:
  pull_request:

jobs:
  pre-pr:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # `cargo {clippy,test} --workspace` builds the `costroid-connect` member, whose
      # Linux keychain backend (sync Secret Service) links C libdbus (T8) — AND, since T18,
      # the `apps/bar` egui taskbar, whose `gtk` (gtk3-rs `-sys` crates, pkg-config probe
      # `gtk+-3.0`) + `tray-icon` (links `xdo`) deps need GTK3 + libxdo dev headers. The
      # default `costroid` binary links none of this, but the `--workspace` build does.
      - name: "Install build deps (keychain libdbus/libsecret + GUI tray GTK3/xdo/appindicator)"
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libsecret-1-dev libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # Smoke-test the opt-in connections build: the `costroid` binary must compile and
      # lint cleanly with the keychain + HTTP + connect-CLI code linked in (off by
      # default; T8/T9/T10a).
      - name: Connect feature — build + lint
        run: |
          cargo build -p costroid --features connect
          cargo clippy -p costroid --features connect --all-targets -- -D warnings

      # Run the T10a Layer-1 connect-action test (proposal §7): it drives the connect
      # command core against a loopback MockServer + the keyring mock — zero real network,
      # zero real keychain — so it runs here like any test. `connect-test-support` is NOT
      # in the shipping `--features connect` build (it only enables the in-crate loopback
      # harness), so it is linted + run via this dedicated step.
      - name: Connect Layer-1 integration test (loopback + keyring mock)
        run: |
          cargo clippy -p costroid --features connect-test-support --all-targets -- -D warnings
          cargo test -p costroid --features connect-test-support

      # Smoke-test the opt-in local-inference build (M3): the `costroid bench` subcommand + the
      # `costroid-power` engine (incl. the Linux sysfs cfg path + the LHM parser, exercised only
      # under `--features power`) must compile, lint, and test cleanly. Off by default, so the
      # default `cargo {clippy,test} --workspace` above never compiles `bench.rs`/the gated paths.
      - name: Power feature — build + lint + test
        run: |
          cargo build -p costroid --features power
          cargo clippy -p costroid --features power --all-targets -- -D warnings
          cargo clippy -p costroid-power --features power --all-targets -- -D warnings
          cargo test -p costroid --features power
          cargo test -p costroid-power --features power

  # Cross-platform TEST-EXECUTION gate (⚑ Readiness gate / §6.6 / R2 — promoted from build-only
  # in M6 T3 / D4). The repo's full fmt+clippy+test runs on Linux (the `pre-pr` job above); the
  # existing distribution already proves macOS/Windows *release* builds via cargo-dist. This job
  # now RUNS the test suites on macOS + Windows (not just `cargo build`), so the workspace's
  # cross-platform behavior — including the new `costroid-server`/`costroid-power` crates — is
  # verified on every change, not only at release. `costroid` links no system libs;
  # `costroid-connect`'s keychain uses the OS-native backend (security-framework on macOS,
  # Windows-native on Windows — no libdbus/GTK apt deps needed) and is kept safe in tests by the
  # process-global mock + the M6 T3 enforced mock invariant (no test reaches a runner's real OS
  # keychain — see costroid-connect::test_support); the bar's GTK tray is Linux-target-gated, so
  # it compiles cleanly here too.
  #
  # D4 scope (exactly): `cargo test --workspace`, `cargo test -p costroid --features power`,
  # `cargo test -p costroid-server`, and the portable static `--test offline` dependency proof.
  # Linux-only stays Linux-only (the strace dynamic offline-acceptance harness, the FOCUS
  # validator, cargo-deny, and the MSRV check are toolchain/OS-pinned for determinism and do not
  # move here). On macOS, which is already provisioned, a `make demo` smoke leg also proves the
  # one-command deterministic demo runs + re-runs byte-identically (D2/T2); Windows has no `make`,
  # so the demo is not run there (the README documents the raw `cargo run` equivalents).
  cross-platform:
    name: cross-platform test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace

      # The `power` feature gates the `costroid bench`/`breakeven` subcommands (M3) + the
      # `costroid-power` engine's cfg paths off the default build, so `--workspace` above never
      # compiles them. Run them here too, on macOS + Windows, so the non-Linux "unavailable" sysfs
      # stub + the cross-OS bench/harness/LHM-parser code stay green everywhere.
      - name: Test power feature (cross-OS)
        run: cargo test -p costroid --features power

      # The loopback-only local web/API server (M5): exercise its tests cross-OS.
      - name: Test server (cross-OS)
        run: cargo test -p costroid-server

      # The static no-network/no-telemetry dependency proof is portable (no strace) — it asserts
      # no networking/telemetry crate is even linked. Run it on every OS so the offline guarantee
      # is proven cross-platform, not only on the Linux offline-acceptance job.
      - name: Static no-network/no-telemetry dependency proof (portable)
        run: cargo test -p costroid --test offline -- --nocapture

      # macOS-only (it has `make`; Windows does not): prove the one-command deterministic demo
      # runs end-to-end and re-runs byte-identically (D2/T2). `make demo-verify` runs `make demo`
      # twice and diffs the merged FOCUS-1.3 ledger, failing on any drift — exit 0 + byte-identical
      # re-run in one target. The demo is fully offline + synthetic + hardware-free.
      - name: make demo smoke (macOS only — byte-identical re-run)
        if: runner.os == 'macOS'
        run: make demo-verify

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The documented MSRV (`[workspace.package] rust-version = "1.88"`) is enforced here,
      # per CLAUDE.md ("document and test the MSRV in CI") — every other job tracks stable.
      # `apps/bar` (the egui taskbar, T18) is EXCLUDED: its egui/eframe 0.34 stack requires
      # Rust 1.92, so the crate declares its own `rust-version = "1.92"` and is checked by
      # the stable jobs, not this 1.88 gate. The shipped `costroid` CLI + the library crates
      # keep the 1.88 MSRV. (T21/release may revisit raising the whole workspace to 1.92.)
      - name: Install Rust 1.88 (MSRV)
        uses: dtolnay/rust-toolchain@1.88

      # The workspace build compiles costroid-connect's Linux keychain backend (libdbus).
      - name: Install keychain build deps (libdbus, libsecret)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libsecret-1-dev

      - name: Check (workspace minus apps/bar, all targets, on the MSRV toolchain)
        run: cargo check --workspace --all-targets --exclude costroid-bar

      # The off-by-default `power` feature (M3) must also hold the 1.88 MSRV — the `--workspace`
      # check above builds `costroid-power` but without its feature, so check the feature-on CLI +
      # engine explicitly (costroid-power inherits 1.88; its deps build on it).
      - name: Check power feature on the MSRV toolchain
        run: |
          cargo check -p costroid-power --features power --all-targets
          cargo check -p costroid --features power --all-targets

  focus-conformance:
    name: FOCUS 1.3 validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pinned: an unpinned validator could change its console format and make the
      # allowlist checker pass vacuously (it now also hard-fails on a missing results
      # summary). Bump deliberately, re-checking scripts/focus_known_failures.txt.
      - name: Install focus-validator
        run: python -m pip install "focus-validator==2.1.0"

      # R8 pricing-snapshot integrity: every vendored snapshot is the byte-for-byte
      # deterministic output of its pinned transform (no hand-edited price). A pure
      # sha256sum -c of the committed sidecars; offline.
      - name: Verify pricing-snapshot integrity
        run: bash scripts/check_pricing_snapshots.sh

      # R8 power-assumption integrity (M3): the vendored hardware/electricity profile + the
      # Gemma 4 model manifest are byte-for-byte their committed sidecars (catches an edited
      # assumption that did not bump `as_of`). A pure sha256sum -c; offline.
      - name: Verify power-profile + model-manifest integrity
        run: bash scripts/check_power_profiles.sh

      # Exports the committed fixtures to FOCUS CSV and runs the official validator
      # (offline, vendored rulesets) against the documented known-failure allowlists:
      # the FOCUS 1.3 CSV leg (exact), the JSON-equivalence leg, the synthetic v1.2-in
      # -> v1.3-out `costroid import` round-trip legs (subset), the v1.2-INPUT leg
      # (a complete 1.2 document vs the vendored 1.2 ruleset, exact), and the
      # merged dev-tool+cloud ledger leg (subset). The real-AWS v1.2 leg is
      # present-but-SKIPPED (set COSTROID_REAL_AWS_FOCUS to run it). Guards
      # against conformance regressions.
      - name: Validate FOCUS export
        env:
          FOCUS_VALIDATOR_PYTHON: python
        run: bash scripts/focus_conformance.sh

  license:
    name: license + supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enforces the Apache-2.0 / no-copyleft policy and the "rustls, never
      # OpenSSL" rule from deny.toml. licenses + bans are fully offline (no
      # RustSec advisory-DB fetch), keeping the gate network-free. `--all-features`
      # makes this the connect-on pass: it resolves the `connect` feature so the
      # sanctioned-trio `wrappers` guards (keyring since T8; ureq + rustls since
      # T9a) are evaluated against the real connect subtree.
      - name: cargo-deny (licenses + bans, connect-on)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans
          arguments: --all-features

  advisories:
    name: security advisories (cargo-deny, online)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The RustSec advisory check fetches the advisory DB, so it lives in this
      # dedicated ONLINE job — keeping the `license` job above (licenses + bans)
      # fully offline. See the header comment in deny.toml.
      - name: cargo-deny (advisories)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  offline-acceptance:
    name: offline acceptance (Phase-1 capstone)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # strace is the authoritative network-isolation mechanism; script/unshare
      # (util-linux) and python3 are preinstalled on ubuntu runners. libdbus/libsecret
      # are needed for the script's `--features connect` baseline build (T8 keychain).
      # Since T21 the script also builds `costroid-bar` (the egui taskbar) for its runtime
      # no-network proof, so the GTK3/xdo/appindicator dev headers are installed too; xvfb
      # lets the optional full-window+AccessKit GUI run exercise the real winit/AccessKit path
      # (the script degrades honestly when it is absent).
      - name: Install strace + keychain + GUI tray build deps + xvfb
        run: sudo apt-get update && sudo apt-get install -y strace libdbus-1-dev libsecret-1-dev libgtk-3-dev libxdo-dev libayatana-appindicator3-dev xvfb

      # Static proof: no networking/telemetry crate is even linked.
      - name: Static no-network/no-telemetry dependency proof
        run: cargo test -p costroid --test offline -- --nocapture

      # Dynamic proof: run every command with networking fully disabled against
      # committed fixtures, asserting no outbound IP traffic is attempted.
      - name: Offline acceptance harness (networking disabled)
        run: bash scripts/offline_acceptance.sh
