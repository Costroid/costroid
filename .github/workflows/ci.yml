name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Reads the pnpm version from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - name: Verify generated code is up to date
        run: |
          make generate
          if ! git diff --exit-code || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date — run 'make generate' and commit the result."
            git status --porcelain
            git diff
            exit 1
          fi
      # Same targets as local development — no CI-only variants.
      - run: make lint
      - run: make test
      - run: make build
