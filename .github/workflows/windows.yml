name: Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    # First-observation posture: report, do not block. Promoted to a hard
    # gate once the suite is proven green on this platform.
    continue-on-error: true
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: go test ./...
