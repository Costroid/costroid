<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f9f9f9"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0b0b0b"
    />
    <title>Costroid</title>
    <script>
      // Pre-paint theme override: applies the stored Device/Dark/Light choice
      // before the bundle loads so a forced theme never flashes the OS one.
      // Kept to the attribute only — meta sync + the switcher live in React
      // (src/theme.ts / src/ThemeSwitch.tsx).
      (() => {
        try {
          var t = localStorage.getItem("costroid-theme");
          if (t === "dark" || t === "light")
            document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          /* storage unavailable — device theme applies */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
