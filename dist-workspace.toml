[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Build each app with `-p` (connect-OFF costroid only) — never the whole workspace, so the
# release runners never compile costroid-connect → keyring → libdbus-sys (no libdbus needed).
precise-builds = true
# The installers to generate for each app
installers = ["shell", "powershell", "npm", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# On pull requests, only run `dist plan` — never build or publish. Combined with
# the tag-only `push` trigger, nothing is built/released until a human pushes a
# version tag.
pr-run-mode = "plan"
# Generate keyless GitHub build-provenance attestations (free, via Actions OIDC)
# and add the id-token/attestations permissions to the release workflow.
github-attestations = true
# Generate a SHA-256 checksum for every artifact.
checksum = "sha256"
# Publish the generated Homebrew formula to this tap repo and the npm package to
# the npm registry. Both run only on a real tag-triggered release and require the
# human-provided HOMEBREW_TAP_TOKEN / NPM_TOKEN secrets.
tap = "Costroid/homebrew-tap"
publish-jobs = ["homebrew", "npm"]
