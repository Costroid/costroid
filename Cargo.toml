[workspace]
members = [
    "apps/cli",
    "crates/costroid-core",
    "crates/costroid-focus",
    "crates/costroid-providers",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/Costroid/costroid"

[workspace.dependencies]
anyhow = "=1.0.102"
chrono = { version = "=0.4.44", features = ["serde"] }
clap = { version = "=4.6.1", features = ["derive"] }
crossterm = "=0.29.0"
csv = "=1.4.0"
ratatui = "=0.30.0"
rust_decimal = { version = "=1.42.0", features = ["serde"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
thiserror = "=2.0.18"

costroid-core = { path = "crates/costroid-core" }
costroid-focus = { path = "crates/costroid-focus" }
costroid-providers = { path = "crates/costroid-providers" }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
expect_used = "deny"
unwrap_used = "deny"

[profile.release]
codegen-units = 1
lto = "thin"
strip = "symbols"
