# THE contract source of truth (decision D20). Go and TypeScript code are
# generated from this file via `make generate` — never hand-edit generated code.
openapi: 3.0.3
info:
  title: Costroid API
  description: HTTP API of the Costroid self-hosted FOCUS-native cost platform.
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness check
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/meta:
    get:
      operationId: getMeta
      summary: Instance metadata
      responses:
        "200":
          description: Metadata about this Costroid instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
  /api/v1/sync/status:
    get:
      operationId: getSyncStatus
      summary: Scheduled ingestion status
      description: >-
        Reports whether this serve process runs the scheduled-ingest loop and
        the latest persisted attempt for every source-name and tenant pair.
        Enabled instances include configured intervals and next-run times.
        History-only sources remain visible after removal from the config.
      responses:
        "200":
          description: Current scheduler configuration merged with persisted run history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "500":
          description: Reading persisted sync history failed.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/costs/daily:
    get:
      operationId: getDailyCosts
      summary: Daily cost by service, provider, or allocation
      description: >-
        Total daily BilledCost per selected grouping key, plus per-day
        and period totals. groupBy=service uses FOCUS ServiceName;
        groupBy=provider uses FOCUS ServiceProviderName; groupBy=subaccount
        uses FOCUS SubAccountName, with rows missing one grouped under
        "(no subaccount)"; groupBy=region uses FOCUS RegionName, with rows
        missing one grouped under "(no region)"; groupBy=tag uses the value of
        the requested FOCUS Tags key, with untagged cost grouped under
        "(untagged)"; groupBy=allocation applies the query-time cost-allocation
        rules (virtual tagging) and keys each cost by its allocation label, with
        cost matching no rule under "Unallocated". Ordering is deterministic:
        days ascending, keys sorted by name. Costs are decimal strings — never
        floats — so no precision is lost. When currency is absent, a single-currency range
        returns that series and currencies contains its one code; a mixed range
        defaults to the alphabetically-first currency's series and currencies
        lists every available code. When currency is present, only that
        currency's series is returned. When provider is present, only that
        FOCUS ServiceProviderName's rows are aggregated and currencies lists
        only currencies with rows for that provider. Providers always lists
        every provider with cost rows in the requested range, unscoped by the
        provider and currency filters, sorted ascending, and is [] for an empty
        range. A valid currency or provider absent from the corresponding list
        returns 200 with total "0", days [], and the requested value echoed.
        An empty range with no currency or provider requested returns currencies
        [], providers [], currency "", provider "", total "0", and days []. An
        invalid currency or provider shape returns 400.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          description: Cost grouping dimension.
          schema:
            type: string
            enum:
              - service
              - provider
              - allocation
              - subaccount
              - region
              - tag
            default: service
        - name: tagKey
          in: query
          description: >-
            Optional FOCUS Tags key whose per-row value becomes the grouping
            key. Used only with groupBy=tag.
          schema:
            type: string
        - name: currency
          in: query
          description: >-
            Optional three-letter uppercase billing currency whose series to
            return. Omit to use the alphabetically-first currency in the range.
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: provider
          in: query
          description: >-
            Optional FOCUS ServiceProviderName whose rows to include. Omit to
            include every provider. Free text at most 8192 bytes; must be
            non-empty when present.
          schema:
            type: string
            minLength: 1
            maxLength: 8192
      responses:
        "200":
          description: Daily costs grouped by the requested dimension for the requested period.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCosts"
        "400":
          description: >-
            Invalid start date, end date, groupBy value, currency shape, or
            provider shape; or groupBy=allocation was requested but no
            allocation rules are configured or the rules file was not found.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: >-
            The cost query failed, including an unreadable, malformed, or invalid
            allocation rules file (reported as "loading allocation rules: …").
          content:
            text/plain:
              schema:
                type: string
  /api/v1/costs/summary:
    get:
      operationId: getCostsSummary
      summary: Period cost summary with optional preceding-window comparison
      description: >-
        Period totals by grouping key for the requested [start, end] window,
        plus an optional preceding-window comparison computed server-side.
        groupBy semantics and validation match /api/v1/costs/daily (service /
        provider / allocation / subaccount / region / tag; allocation
        unconfigured → 400; malformed rules → 500). All money values are
        exact decimal strings (never floats).
        The response `total` equals /api/v1/costs/daily's period total for
        identical params. Keys are ordered total-desc, then key-asc.

        Preceding window: prevEnd = start − 1 day, prevStart = prevEnd −
        (end − start). The selected currency is pinned to BOTH windows. The
        selected provider is pinned to BOTH windows. When provider is present,
        currencies lists only that provider's currencies. Providers always
        lists every provider with cost rows in the CURRENT window, unscoped by
        the provider and currency filters, sorted ascending, and is [] for an
        empty range. ALL
        previous-window fields (previousTotal, previousStart, previousEnd, and
        every keys[].previousTotal / keys[].delta) are ABSENT together — never
        null or "" — when the preceding window is UNDEFINED: (i) start or end
        is unbounded/empty; (ii) the current window is empty (there are no keys
        to compare); or (iii) the preceding-window query returns zero cost rows
        in the selected currency. Never emit previousTotal "0" for a data-empty
        preceding window. A store error from either window is a 500.

        When the preceding window is DEFINED, every key carries delta =
        total − previousTotal (exact decimal.Sub); keys absent from the previous
        window omit previousTotal while delta equals total (previousTotal-absence
        alone marks newness). "Gone" keys (present only in the previous window)
        are out of scope for this version. Empty CURRENT window: total "0",
        keys [] (never null). No share field — client Number() geometry only.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) of the CURRENT window. Defaults to
            the full range of stored data. Unbounded start makes the preceding
            window undefined.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) of the CURRENT window. Defaults to
            the full range of stored data. Unbounded end makes the preceding
            window undefined.
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          description: Cost grouping dimension (same set as /api/v1/costs/daily).
          schema:
            type: string
            enum:
              - service
              - provider
              - allocation
              - subaccount
              - region
              - tag
            default: service
        - name: tagKey
          in: query
          description: >-
            Optional FOCUS Tags key whose per-row value becomes the grouping
            key. Used only with groupBy=tag.
          schema:
            type: string
        - name: currency
          in: query
          description: >-
            Optional three-letter uppercase billing currency whose summary to
            return. Omit to use the alphabetically-first currency in the
            current window.
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: provider
          in: query
          description: >-
            Optional FOCUS ServiceProviderName whose rows to include. Omit to
            include every provider. Free text at most 8192 bytes; must be
            non-empty when present.
          schema:
            type: string
            minLength: 1
            maxLength: 8192
      responses:
        "200":
          description: Period cost summary for the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostsSummary"
        "400":
          description: >-
            Invalid start date, end date, groupBy value, currency shape, or
            provider shape; or groupBy=allocation was requested but no
            allocation rules are configured or the rules file was not found.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: >-
            The cost query failed, including an unreadable, malformed, or
            invalid allocation rules file.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/anomalies:
    get:
      operationId: getAnomalies
      summary: Statistical cost anomalies (spikes and dips)
      description: >-
        Flags spikes and dips in the daily cost series with a robust median/MAD
        detector computed at QUERY time — stateless, so retroactive FOCUS
        corrections are automatically re-scored. Uses the SAME groupBy dimensions
        as /api/v1/costs/daily and scores both the per-day TOTAL series (the sum
        over the day's keys) and each grouping key's own series. Flags are
        range-INDEPENDENT: the full stored history up to the requested end is
        scored, then only flags whose day falls inside [start, end] are returned,
        so a given day yields the identical flag regardless of the queried start.
        Passing currency scopes scoring to that billing currency. Passing
        provider scopes scoring to that FOCUS ServiceProviderName's history.
        When currency is omitted, scoring defaults to the alphabetically-first
        billing currency for the selected provider in the requested window
        [start, end], falling back to full history when the window is empty.
        Every statistic is an exact decimal string and the detector's fixed
        parameters are echoed, so each flag is hand-recomputable.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) of the RETURNED flags; it does not
            affect the scoring baseline. Defaults to the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to score and return. Defaults to the
            full range of stored data.
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          description: Cost grouping dimension (the same set as /api/v1/costs/daily).
          schema:
            type: string
            enum:
              - service
              - provider
              - allocation
              - subaccount
              - region
              - tag
            default: service
        - name: tagKey
          in: query
          description: >-
            Optional FOCUS Tags key whose per-row value becomes the grouping
            key. Used only with groupBy=tag.
          schema:
            type: string
        - name: currency
          in: query
          description: >-
            Optional three-letter uppercase billing currency whose history to
            score. Omit to use the alphabetically-first currency in the requested
            window [start, end], falling back to full history when the window is
            empty.
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: provider
          in: query
          description: >-
            Optional FOCUS ServiceProviderName whose history to score. Omit to
            score every provider. Free text at most 8192 bytes; must be
            non-empty when present.
          schema:
            type: string
            minLength: 1
            maxLength: 8192
      responses:
        "200":
          description: Detected anomalies for the requested period; [] when none.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Anomalies"
        "400":
          description: >-
            Invalid start date, end date, groupBy value, currency shape, or
            provider shape; or groupBy=allocation was requested but no
            allocation rules are configured or the rules file was not found.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: >-
            The cost query failed, including an unreadable, malformed, or
            invalid allocation rules file.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/insights:
    get:
      operationId: getInsights
      summary: Deterministic cost insights digest
      description: >-
        Ranked list of deterministic, formula-transparent observations over the
        cost data already in the store. No machine learning and no external
        calls: every number is a hand-recomputable exact decimal string. The
        whole response is computed inside a single resolved billing currency
        (never mixed). Observations are ranked by magnitude descending using
        exact decimal comparison, then type ascending, then key ascending.
        Each observation type is suppressed (absent from the array) when its
        condition does not hold. An empty store returns insights: [] with HTTP
        200. The parameters object echoes every fixed constant needed to
        recompute, including the anomaly detector constants and the division
        scale used for derived ratios and unit costs.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) of the observation window.
            Defaults to the full range of stored data. Both start and end must
            be provided for comparison types (top-mover, unit-cost-drift).
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) of the observation window.
            Defaults to the full range of stored data. Both start and end must
            be provided for comparison types (top-mover, unit-cost-drift).
          schema:
            type: string
            format: date
        - name: currency
          in: query
          description: >-
            Optional three-letter uppercase billing currency for the digest.
            Omit to use the alphabetically-first currency in the requested
            window [start, end], falling back to full history when the window
            has none.
          schema:
            type: string
            pattern: ^[A-Z]{3}$
      responses:
        "200":
          description: Ranked insights for the requested window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insights"
        "400":
          description: >-
            Invalid start date, end date, or currency shape.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: A store query failed while building the digest.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/usage/tokens/daily:
    get:
      operationId: getDailyTokens
      summary: Daily token usage by service
      description: >-
        Total daily token ConsumedQuantity per service, for the default
        tenant. Scoped to token usage: only enriched rows whose ConsumedUnit
        is "Tokens" appear. A row whose ConsumedQuantity is null (money-only
        rows — credits, undifferentiated call fees, unmatched usage) is
        skipped, never surfaced with a zero or fabricated quantity, and
        non-token FOCUS usage quantities are excluded. Ordering is
        deterministic: day ascending, then serviceName, then consumedUnit.
        Quantities are exact decimal strings — never floats — so a large
        token count loses no precision.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: >-
            Daily token usage grouped by service and unit for the
            requested period, day-ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTokenUsage"
        "400":
          description: Invalid start or end date.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/business-metrics:
    get:
      operationId: getBusinessMetrics
      summary: List imported business metrics
      description: >-
        Lists the default tenant's user-authored business metrics and their
        inclusive stored day spans, sorted by name. These business-value counts
        are separate from vendor usage metrics and never appear in the AI Usage
        endpoint.
      responses:
        "200":
          description: Business metric names and available day spans.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessMetrics"
        "500":
          description: The business-metric list query failed.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/unit-economics/daily:
    get:
      operationId: getDailyUnitEconomics
      summary: Daily and period unit economics for one business metric
      description: >-
        Merges exact daily BilledCost with one imported business metric. A day
        is covered only when both a cost total (of any sign) and a positive
        quantity exist. Period cost and quantity aggregate covered days only.
        A provider filter applies ONLY to the cost side: business-metric
        quantities are org-wide, so unit cost under a filter is the selected
        provider's cost per org-wide unit, and days where only other providers
        had cost count as uncovered. unitCost is derived in Go as cost /
        quantity rounded to scale 18, round-half-away-from-zero, then rendered
        as a decimal string with trailing zeros trimmed. A rendered "0" means
        the exact quotient rounds to zero at scale 18. Ratios are derived on
        read and never stored.
      parameters:
        - name: metric
          in: query
          required: true
          description: Exact imported business metric name.
          schema:
            type: string
        - name: start
          in: query
          description: Inclusive first UTC calendar day; defaults to unbounded.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: Inclusive last UTC calendar day; defaults to unbounded.
          schema:
            type: string
            format: date
        - name: currency
          in: query
          description: >-
            Optional three-letter uppercase billing currency whose costs to
            merge with the business metric. Omit to use the
            alphabetically-first currency in the range.
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: provider
          in: query
          description: >-
            Optional FOCUS ServiceProviderName. Filters ONLY the cost side:
            business-metric quantities are org-wide, so unit cost under a
            filter is the selected provider's cost per org-wide unit, and days
            where only other providers had cost count as uncovered.
          schema:
            type: string
            minLength: 1
            maxLength: 8192
      responses:
        "200":
          description: Daily gaps and covered-only period unit economics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitEconomics"
        "400":
          description: >-
            Missing or empty metric, an invalid start/end date, an invalid
            currency shape, or an invalid provider shape.
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: The named business metric has never been imported.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: A cost or business-metric store query failed.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/usage/metrics/daily:
    get:
      operationId: getDailyUsageMetrics
      summary: Daily cost-orphaned usage metrics
      description: >-
        Total daily quantity per service, tier, metric, and unit, for the
        default tenant. These are the cost-orphaned usage metrics the AI-vendor
        connectors fetch but that carry no money on the vendor's cost report
        (Anthropic priority/flex-tier tokens and web-search request counts;
        standard/batch usage keys no cost row referenced; OpenAI
        recognized-but-unpriced line items). They live OUTSIDE the FOCUS cost
        dataset, so they never appear in the daily-cost or daily-token views and
        never contribute to any cost or token total. Ordering is deterministic:
        day ascending, then serviceName, serviceTier, metricName, unit.
        Quantities are exact decimal strings — never floats. serviceTier is ""
        when the vendor has no tier concept.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: >-
            Daily usage metrics grouped by service, tier, metric, and unit
            for the requested period, day-ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyUsageMetric"
        "400":
          description: Invalid start or end date.
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Meta:
      type: object
      required:
        - name
        - version
        - focusVersion
        - demo
      properties:
        name:
          type: string
          description: Service name.
          example: costroid
        version:
          type: string
          description: Version of the running Costroid binary.
          example: 0.1.0-dev
        focusVersion:
          type: string
          description: FOCUS specification version the internal model targets (decision D4).
          example: "1.4"
        demo:
          type: boolean
          description: True only for the isolated, synthetic, read-only product demo.
          example: false
    SyncStatusResponse:
      type: object
      required:
        - enabled
        - sources
      properties:
        enabled:
          type: boolean
          description: True when this serve process runs scheduled ingestion.
        sources:
          type: array
          description: One entry per source-name and tenant retention key.
          items:
            $ref: "#/components/schemas/SyncSourceStatus"
    SyncSourceStatus:
      type: object
      required:
        - name
        - connector
        - tenant
      properties:
        name:
          type: string
        connector:
          type: string
        tenant:
          type: string
        interval:
          type: string
          description: Configured Go duration string, present only for an enabled configured source.
        nextRunAt:
          type: string
          format: date-time
          description: Next due time in UTC, present only for an enabled configured source.
        lastRun:
          $ref: "#/components/schemas/SyncLastRun"
        lastSuccessAt:
          type: string
          format: date-time
          description: Last successful finish time in UTC, absent when the source has never succeeded.
    SyncLastRun:
      type: object
      required:
        - startedAt
        - finishedAt
        - outcome
        - periodsProcessed
        - periodsSkipped
        - recordsIngested
      properties:
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        outcome:
          type: string
          enum:
            - success
            - partial
            - error
        error:
          type: string
          description: Present only when the recorded error is non-empty.
        periodsProcessed:
          type: integer
          format: int64
        periodsSkipped:
          type: integer
          format: int64
        recordsIngested:
          type: integer
          format: int64
    DailyCosts:
      type: object
      required:
        - currency
        - currencies
        - days
        - provider
        - providers
        - tagKeys
        - total
      properties:
        currency:
          type: string
          description: >-
            Billing currency of this response's series (FOCUS BillingCurrency):
            the currency query parameter when provided, otherwise the
            alphabetically-first currency in range, or "" when the range is
            empty.
          example: USD
        currencies:
          type: array
          description: >-
            All billing currencies with cost rows in the requested range,
            sorted ascending. This is the source for a currency selector and is
            [] (never null) when the range is empty.
          items:
            type: string
          example:
            - EUR
            - USD
        provider:
          type: string
          description: >-
            FOCUS ServiceProviderName of this response's rows: the provider
            query parameter when provided, otherwise "".
          example: Amazon Web Services
        providers:
          type: array
          description: >-
            All FOCUS ServiceProviderName values with cost rows in the requested
            range, not scoped by the provider or currency filters, sorted
            ascending. This is the source for a provider selector and is []
            (never null) when the range is empty.
          items:
            type: string
          example:
            - Amazon Web Services
            - Microsoft
        tagKeys:
          type: array
          description: >-
            All FOCUS Tags keys with cost rows in the requested range, not
            scoped by the provider or currency filters, sorted ascending. This
            is the source for a tag-key picker and is [] (never null) when the
            range is empty.
          items:
            type: string
          example:
            - environment
        days:
          type: array
          description: One entry per calendar day with data, days ascending.
          items:
            $ref: "#/components/schemas/DailyCost"
        total:
          type: string
          description: Total cost of the whole period, as a decimal string.
          example: "32.7663"
    CostsSummary:
      type: object
      required:
        - currency
        - currencies
        - provider
        - providers
        - total
        - keys
      properties:
        currency:
          type: string
          description: >-
            Billing currency of this response's summary (FOCUS BillingCurrency):
            the currency query parameter when provided, otherwise the
            alphabetically-first currency in the current window, or "" when
            the window is empty.
          example: USD
        currencies:
          type: array
          description: >-
            All billing currencies with cost rows in the current window,
            sorted ascending. This is the source for a currency selector and is
            [] (never null) when the window is empty.
          items:
            type: string
          example:
            - EUR
            - USD
        provider:
          type: string
          description: >-
            FOCUS ServiceProviderName of this response's rows: the provider
            query parameter when provided, otherwise "".
          example: Amazon Web Services
        providers:
          type: array
          description: >-
            All FOCUS ServiceProviderName values with cost rows in the requested
            range, not scoped by the provider or currency filters, sorted
            ascending. This is the source for a provider selector and is []
            (never null) when the range is empty.
          items:
            type: string
          example:
            - Amazon Web Services
            - Microsoft
        total:
          type: string
          description: >-
            Period total for the current window as a decimal string. Equals
            /api/v1/costs/daily's period total for identical params. "0" when
            the current window is empty.
          example: "964050.632653589793238462"
        previousTotal:
          type: string
          description: >-
            Period total of the preceding window as a decimal string. Present
            only when the preceding window is defined (see path description);
            omitted entirely otherwise — never null or "0" for an undefined window.
          example: "120000.50"
        previousStart:
          type: string
          format: date
          description: >-
            Inclusive first day of the preceding window. Present exactly when
            previousTotal is present.
          example: "2025-12-13"
        previousEnd:
          type: string
          format: date
          description: >-
            Inclusive last day of the preceding window. Present exactly when
            previousTotal is present.
          example: "2026-01-11"
        keys:
          type: array
          description: >-
            Per-key period totals for the current window, ordered total-desc
            then key-asc. Never null; [] when the current window is empty.
            Gone keys (previous-only) are out of scope.
          items:
            $ref: "#/components/schemas/CostSummaryKey"
    CostSummaryKey:
      type: object
      required:
        - key
        - total
      properties:
        key:
          type: string
          description: >-
            Grouping key: FOCUS ServiceName (groupBy=service), FOCUS
            ServiceProviderName (groupBy=provider), FOCUS SubAccountName
            (groupBy=subaccount; missing names appear under "(no subaccount)"),
            FOCUS RegionName (groupBy=region; missing names appear under
            "(no region)"), the value of the requested FOCUS Tags key
            (groupBy=tag; untagged cost appears under "(untagged)"), or the
            allocation label (groupBy=allocation).
          example: Amazon Web Services
        total:
          type: string
          description: Period total for this key in the current window, as a decimal string.
          example: "3141.592653589793238462"
        previousTotal:
          type: string
          description: >-
            Period total for this key in the preceding window. Present only when
            the preceding window is defined AND the key had cost there; omitted
            for new keys (delta then equals total) and when the window is undefined.
          example: "2800.00"
        delta:
          type: string
          description: >-
            Exact total − previousTotal (decimal.Sub). Present on EVERY key when
            the preceding window is defined; omitted on every key when undefined.
            For a new key (no previousTotal), delta equals total.
          example: "341.592653589793238462"
    DailyCost:
      type: object
      required:
        - date
        - total
        - services
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-06-01"
        total:
          type: string
          description: Total cost of the day, as a decimal string.
          example: "4.6809"
        services:
          type: array
          description: Per-group costs, sorted by grouping key.
          items:
            $ref: "#/components/schemas/ServiceCost"
    ServiceCost:
      type: object
      required:
        - key
        - cost
      properties:
        key:
          type: string
          description: >-
            Grouping key: FOCUS ServiceName (groupBy=service), FOCUS
            ServiceProviderName (groupBy=provider), FOCUS SubAccountName
            (groupBy=subaccount; missing names appear under "(no subaccount)"),
            FOCUS RegionName (groupBy=region; missing names appear under
            "(no region)"), the value of the requested FOCUS Tags key
            (groupBy=tag; untagged cost appears under "(untagged)"), or the
            allocation label (groupBy=allocation; cost matching no rule appears
            under "Unallocated").
          example: Amazon Elastic Compute Cloud
        cost:
          type: string
          description: Cost total, as a decimal string.
          example: "2.4192"
    Anomalies:
      type: object
      required:
        - currency
        - parameters
        - anomalies
      properties:
        currency:
          type: string
          description: >-
            Billing currency of the scored costs (FOCUS BillingCurrency). Empty
            when no data matched.
          example: USD
        parameters:
          $ref: "#/components/schemas/AnomalyParameters"
        anomalies:
          type: array
          description: >-
            Detected flags, ordered date-ascending, then total scope before key
            scope, then key-ascending. Never null; [] when nothing is flagged.
          items:
            $ref: "#/components/schemas/Anomaly"
    AnomalyParameters:
      type: object
      required:
        - k
        - consistencyConstant
        - windowDays
        - minObservations
        - relativeFloor
        - groupBy
        - tagKey
      properties:
        k:
          type: string
          description: Strict-threshold multiple of the scaled MAD, as a decimal string.
          example: "3"
        consistencyConstant:
          type: string
          description: MAD-to-sigma consistency constant (R stats::mad), as a decimal string.
          example: "1.4826"
        windowDays:
          type: integer
          description: Maximum trailing observed days in the baseline window.
          example: 30
        minObservations:
          type: integer
          description: Minimum baseline observations required to score a day.
          example: 10
        relativeFloor:
          type: string
          description: >-
            Fraction of the absolute median a deviation must also reach, as a
            decimal string.
          example: "0.1"
        groupBy:
          type: string
          description: The grouping dimension echoed verbatim from the request.
          example: service
        tagKey:
          type: string
          description: >-
            The requested FOCUS Tags key echoed verbatim, or "" when the
            request is not grouped by tag.
          example: environment
    Anomaly:
      type: object
      required:
        - date
        - scope
        - direction
        - observed
        - median
        - mad
        - scaledMad
        - threshold
        - deviation
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day flagged.
          example: "2026-06-18"
        scope:
          type: string
          description: >-
            "total" (the summed daily series) or "key" (one grouping key's
            series).
          example: total
        key:
          type: string
          description: >-
            The grouping key whose series flagged; present ONLY when scope is
            "key" (never for "total", so a real key literally named "total" is
            unambiguous).
          example: Amazon Elastic Compute Cloud
        direction:
          type: string
          description: >-
            "increase" when observed is above the median, "decrease" when below.
          example: increase
        observed:
          type: string
          description: The day's observed value, as an exact decimal string.
          example: "31.2"
        median:
          type: string
          description: Baseline median, as an exact decimal string.
          example: "4.6809"
        mad:
          type: string
          description: Baseline median absolute deviation, as an exact decimal string.
          example: "0.0013"
        scaledMad:
          type: string
          description: mad times consistencyConstant, as an exact decimal string.
          example: "0.00192738"
        threshold:
          type: string
          description: >-
            k times scaledMad — the strict flag threshold, as an exact decimal
            string.
          example: "0.00578214"
        deviation:
          type: string
          description: The absolute difference of observed and median, as a decimal string.
          example: "26.5191"
    Insights:
      type: object
      required:
        - currency
        - currencies
        - parameters
        - insights
      properties:
        currency:
          type: string
          description: >-
            Resolved billing currency of this digest (FOCUS BillingCurrency):
            the currency query parameter when provided, otherwise the
            alphabetically-first currency in the requested window (falling
            back to full history when the window has none), or "" when no
            billing currencies exist at all.
          example: USD
        currencies:
          type: array
          description: >-
            All billing currencies with cost rows in the requested window,
            sorted ascending. Never null; [] when the window is empty.
          items:
            type: string
          example: ["EUR", "USD"]
        start:
          type: string
          format: date
          description: Echo of the request start when provided; omitted when absent.
        end:
          type: string
          format: date
          description: Echo of the request end when provided; omitted when absent.
        parameters:
          $ref: "#/components/schemas/InsightParameters"
        insights:
          type: array
          description: >-
            Ranked observations, magnitude-desc then type-asc then key-asc.
            Never null; [] when nothing qualifies.
          items:
            $ref: "#/components/schemas/Insight"
    InsightParameters:
      type: object
      required:
        - k
        - consistencyConstant
        - windowDays
        - minObservations
        - relativeFloor
        - divisionScale
      properties:
        k:
          type: string
          description: >-
            Strict-threshold multiple of the scaled MAD used by the anomaly
            detector, as a decimal string. Same value as AnomalyParameters.k.
          example: "3"
        consistencyConstant:
          type: string
          description: >-
            MAD-to-sigma consistency constant used by the anomaly detector, as
            a decimal string. Same value as AnomalyParameters.consistencyConstant.
          example: "1.4826"
        windowDays:
          type: integer
          description: >-
            Maximum trailing observed days in the anomaly baseline window.
            Same value as AnomalyParameters.windowDays.
          example: 30
        minObservations:
          type: integer
          description: >-
            Minimum baseline observations required to score an anomaly day.
            Same value as AnomalyParameters.minObservations.
          example: 10
        relativeFloor:
          type: string
          description: >-
            Fraction of the absolute median an anomaly deviation must also
            reach, as a decimal string. Same value as
            AnomalyParameters.relativeFloor.
          example: "0.1"
        divisionScale:
          type: integer
          description: >-
            Fractional scale used for every DivRound in this digest (derived
            shares, unit costs, commitment ratio). Matches the store's
            DECIMAL(38,18) capacity.
          example: 18
    Insight:
      type: object
      required:
        - type
        - title
        - body
        - magnitude
        - evidence
        - period
        - link
      properties:
        type:
          type: string
          description: >-
            Machine identifier of the observation. One of top-mover,
            untagged-spend, unallocated-spend, anomaly-digest, unit-cost-drift,
            commitment-realization.
          example: top-mover
        title:
          type: string
          description: Short English headline for the observation.
          example: Largest service cost increase
        body:
          type: string
          description: >-
            One to three English sentences stating the numbers compared and
            the arithmetic. Formula-transparent; ASCII punctuation only.
        magnitude:
          type: string
          description: >-
            Money amount in the resolved currency used for ranking, as an
            exact decimal string. For unit-cost-drift this is a DERIVED value
            (absolute window cost of the unit-cost change). For other types it
            is an exact absolute money delta or total.
          example: "42.5"
        dimension:
          type: string
          description: >-
            What key identifies: service, tagKey, or metric. Omitted when the
            observation has no dimension (for example unallocated-spend).
          example: service
        key:
          type: string
          description: >-
            The specific service, tag key, metric, or allocation label this
            observation is about. Omitted for total-scope anomaly-digest.
          example: Amazon EC2
        evidence:
          type: array
          description: >-
            Ordered name/value pairs. Monetary and statistical values are
            exact decimal strings. Never null; [] when empty.
          items:
            $ref: "#/components/schemas/InsightEvidence"
        period:
          $ref: "#/components/schemas/InsightPeriod"
        link:
          $ref: "#/components/schemas/InsightLink"
    InsightEvidence:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: Evidence field name (for example total, delta, share).
          example: delta
        value:
          type: string
          description: >-
            Evidence value as a string. Money and statistics are exact
            decimal strings; derived values (share, unit costs, ratio,
            costOfDrift) are DivRound results at divisionScale.
          example: "12.5"
    InsightPeriod:
      type: object
      properties:
        start:
          type: string
          format: date
          description: >-
            Request window start when the request provided start; omitted
            otherwise (never a zero date).
        end:
          type: string
          format: date
          description: >-
            Request window end when the request provided end; omitted
            otherwise (never a zero date).
        previousStart:
          type: string
          format: date
          description: >-
            Inclusive first day of the preceding comparison window. Present
            only for comparison observation types when that window is defined.
        previousEnd:
          type: string
          format: date
          description: >-
            Inclusive last day of the preceding comparison window. Present
            only for comparison observation types when that window is defined.
    InsightLink:
      type: object
      description: >-
        Structured dashboard state for deep-linking. The server never assembles
        a URL or hash fragment; the client owns encoding. Optional fields only.
      properties:
        view:
          type: string
          description: >-
            Dashboard view name (overview, costs, tokens, usage,
            unit-economics, sources).
          example: costs
        start:
          type: string
          description: Inclusive window start as YYYY-MM-DD when known.
        end:
          type: string
          description: Inclusive window end as YYYY-MM-DD when known.
        groupBy:
          type: string
          description: >-
            Grouping dimension: service, provider, allocation, subaccount,
            region, or tag. When tag, tagKey is also set.
          example: service
        tagKey:
          type: string
          description: FOCUS Tags key; present if and only if groupBy is tag.
        currency:
          type: string
          description: Three-letter billing currency when known.
          example: USD
        provider:
          type: string
          description: Optional FOCUS ServiceProviderName filter.
        metric:
          type: string
          description: Business metric name for unit-economics views.
    DailyTokenUsage:
      type: object
      required:
        - date
        - serviceName
        - consumedUnit
        - consumedQuantity
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-05-01"
        serviceName:
          type: string
          description: FOCUS ServiceName.
          example: OpenAI API
        consumedUnit:
          type: string
          description: FOCUS ConsumedUnit (always "Tokens" today).
          example: Tokens
        consumedQuantity:
          type: string
          description: >-
            Total ConsumedQuantity for the day/service/unit, as an exact
            decimal string — never a float.
          example: "1500000"
    DailyUsageMetric:
      type: object
      required:
        - date
        - serviceName
        - serviceTier
        - metricName
        - unit
        - quantity
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-05-01"
        serviceName:
          type: string
          description: Service or model identity.
          example: claude-opus-4-6
        serviceTier:
          type: string
          description: >-
            Vendor service tier, or "" when the vendor has no tier concept.
          example: priority
        metricName:
          type: string
          description: >-
            Frozen metric identifier (a token_type, "web_search_requests",
            or an opaque line item).
          example: uncached_input_tokens
        unit:
          type: string
          description: 'Frozen unit vocabulary: "Tokens", "Requests", or "Unknown".'
          example: Tokens
        quantity:
          type: string
          description: >-
            Total quantity for the day/service/tier/metric/unit, as an exact
            decimal string — never a float.
          example: "999"
    BusinessMetrics:
      type: object
      required:
        - metrics
      properties:
        metrics:
          type: array
          description: Imported business metrics, sorted by name; never null.
          items:
            $ref: "#/components/schemas/BusinessMetricInfo"
    BusinessMetricInfo:
      type: object
      required:
        - name
        - firstDay
        - lastDay
      properties:
        name:
          type: string
          description: Exact metric identity used by the unit-economics query.
          example: requests served
        firstDay:
          type: string
          format: date
          description: First stored UTC calendar day.
          example: "2026-05-01"
        lastDay:
          type: string
          format: date
          description: Last stored UTC calendar day.
          example: "2026-05-31"
    UnitEconomics:
      type: object
      required:
        - metric
        - currency
        - currencies
        - provider
        - providers
        - days
        - period
      properties:
        metric:
          type: string
          example: requests served
        currency:
          type: string
          description: >-
            Cost-side BillingCurrency: the currency query parameter when
            provided, otherwise the alphabetically-first currency in the
            range, or "" when the range is empty.
          example: USD
        currencies:
          type: array
          description: >-
            All billing currencies with cost rows in the requested range,
            sorted ascending. This is the source for a currency selector and is
            [] (never null) when the range is empty.
          items:
            type: string
          example:
            - EUR
            - USD
        provider:
          type: string
          description: >-
            FOCUS ServiceProviderName of this response's rows: the provider
            query parameter when provided, otherwise "".
          example: Amazon Web Services
        providers:
          type: array
          description: >-
            All FOCUS ServiceProviderName values with cost rows in the requested
            range, not scoped by the provider or currency filters, sorted
            ascending. This is the source for a provider selector and is []
            (never null) when the range is empty.
          items:
            type: string
          example:
            - Amazon Web Services
            - Microsoft
        days:
          type: array
          description: Union of cost and metric days, day-ascending.
          items:
            $ref: "#/components/schemas/UnitEconomicsDay"
        period:
          $ref: "#/components/schemas/UnitEconomicsPeriod"
    UnitEconomicsDay:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        cost:
          type: string
          description: Exact daily cost when a cost bin exists; any sign is retained.
        quantity:
          type: string
          description: Exact daily business quantity when a metric bin exists.
        unitCost:
          type: string
          description: >-
            Present only for a covered day. cost / quantity rounded to scale 18
            with round-half-away-from-zero, trailing zeros trimmed. "0" is a
            meaningful rounded result and is not omitted.
    UnitEconomicsPeriod:
      type: object
      required:
        - coveredDays
        - cost
        - quantity
      properties:
        coveredDays:
          type: integer
          minimum: 0
          description: Number of days carrying both cost and positive quantity.
        cost:
          type: string
          description: Exact cost sum over covered days only.
        quantity:
          type: string
          description: Exact quantity sum over covered days only.
        unitCost:
          type: string
          description: >-
            Covered-period cost / quantity at scale 18,
            round-half-away-from-zero; absent when coveredDays is zero.
