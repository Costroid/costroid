# THE contract source of truth (decision D20). Go and TypeScript code are
# generated from this file via `make generate` — never hand-edit generated code.
openapi: 3.0.3
info:
  title: Costroid API
  description: HTTP API of the Costroid self-hosted FOCUS-native cost platform.
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness check
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/meta:
    get:
      operationId: getMeta
      summary: Instance metadata
      responses:
        "200":
          description: Metadata about this Costroid instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
  /api/v1/costs/daily:
    get:
      operationId: getDailyCosts
      summary: Daily cost by service, provider, or allocation
      description: >-
        Total daily BilledCost per selected grouping key, plus per-day
        and period totals. groupBy=service uses FOCUS ServiceName;
        groupBy=provider uses FOCUS ServiceProviderName; groupBy=allocation
        applies the query-time cost-allocation rules (virtual tagging) and
        keys each cost by its allocation label, with cost matching no rule
        under "Unallocated". Ordering is deterministic: days ascending, keys
        sorted by name. Costs are decimal strings — never floats — so no
        precision is lost.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          description: Cost grouping dimension.
          schema:
            type: string
            enum:
              - service
              - provider
              - allocation
            default: service
      responses:
        "200":
          description: Daily costs grouped by the requested dimension for the requested period.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCosts"
        "400":
          description: >-
            Invalid start date, end date, or groupBy value; or
            groupBy=allocation was requested but no allocation rules are
            configured or the rules file was not found.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: >-
            The cost query failed, including an unreadable, malformed, or invalid
            allocation rules file (reported as "loading allocation rules: …").
          content:
            text/plain:
              schema:
                type: string
  /api/v1/usage/tokens/daily:
    get:
      operationId: getDailyTokens
      summary: Daily token usage by service
      description: >-
        Total daily token ConsumedQuantity per service, for the default
        tenant. Scoped to token usage: only enriched rows whose ConsumedUnit
        is "Tokens" appear. A row whose ConsumedQuantity is null (money-only
        rows — credits, undifferentiated call fees, unmatched usage) is
        skipped, never surfaced with a zero or fabricated quantity, and
        non-token FOCUS usage quantities are excluded. Ordering is
        deterministic: day ascending, then serviceName, then consumedUnit.
        Quantities are exact decimal strings — never floats — so a large
        token count loses no precision.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: >-
            Daily token usage grouped by service and unit for the
            requested period, day-ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTokenUsage"
        "400":
          description: Invalid start or end date.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/business-metrics:
    get:
      operationId: getBusinessMetrics
      summary: List imported business metrics
      description: >-
        Lists the default tenant's user-authored business metrics and their
        inclusive stored day spans, sorted by name. These business-value counts
        are separate from vendor usage metrics and never appear in the AI Usage
        endpoint.
      responses:
        "200":
          description: Business metric names and available day spans.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessMetrics"
        "500":
          description: The business-metric list query failed.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/unit-economics/daily:
    get:
      operationId: getDailyUnitEconomics
      summary: Daily and period unit economics for one business metric
      description: >-
        Merges exact daily BilledCost with one imported business metric. A day
        is covered only when both a cost total (of any sign) and a positive
        quantity exist. Period cost and quantity aggregate covered days only.
        unitCost is derived in Go as cost / quantity rounded to scale 18,
        round-half-away-from-zero, then rendered as a decimal string with
        trailing zeros trimmed. A rendered "0" means the exact quotient rounds
        to zero at scale 18. Ratios are derived on read and never stored.
      parameters:
        - name: metric
          in: query
          description: Exact imported business metric name.
          schema:
            type: string
        - name: start
          in: query
          description: Inclusive first UTC calendar day; defaults to unbounded.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: Inclusive last UTC calendar day; defaults to unbounded.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily gaps and covered-only period unit economics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitEconomics"
        "400":
          description: Missing or empty metric, or an invalid start/end date.
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: The named business metric has never been imported.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: A cost or business-metric store query failed.
          content:
            text/plain:
              schema:
                type: string
  /api/v1/usage/metrics/daily:
    get:
      operationId: getDailyUsageMetrics
      summary: Daily cost-orphaned usage metrics
      description: >-
        Total daily quantity per service, tier, metric, and unit, for the
        default tenant. These are the cost-orphaned usage metrics the AI-vendor
        connectors fetch but that carry no money on the vendor's cost report
        (Anthropic priority/flex-tier tokens and web-search request counts;
        standard/batch usage keys no cost row referenced; OpenAI
        recognized-but-unpriced line items). They live OUTSIDE the FOCUS cost
        dataset, so they never appear in the daily-cost or daily-token views and
        never contribute to any cost or token total. Ordering is deterministic:
        day ascending, then serviceName, serviceTier, metricName, unit.
        Quantities are exact decimal strings — never floats. serviceTier is ""
        when the vendor has no tier concept.
      parameters:
        - name: start
          in: query
          description: >-
            Inclusive first calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
        - name: end
          in: query
          description: >-
            Inclusive last calendar day (UTC) to include. Defaults to
            the full range of stored data.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: >-
            Daily usage metrics grouped by service, tier, metric, and unit
            for the requested period, day-ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyUsageMetric"
        "400":
          description: Invalid start or end date.
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Meta:
      type: object
      required:
        - name
        - version
        - focusVersion
      properties:
        name:
          type: string
          description: Service name.
          example: costroid
        version:
          type: string
          description: Version of the running Costroid binary.
          example: 0.1.0-dev
        focusVersion:
          type: string
          description: FOCUS specification version the internal model targets (decision D4).
          example: "1.4"
    DailyCosts:
      type: object
      required:
        - currency
        - days
        - total
      properties:
        currency:
          type: string
          description: >-
            Billing currency of all listed costs (FOCUS BillingCurrency).
            Empty when no data matched the requested period.
          example: USD
        days:
          type: array
          description: One entry per calendar day with data, days ascending.
          items:
            $ref: "#/components/schemas/DailyCost"
        total:
          type: string
          description: Total cost of the whole period, as a decimal string.
          example: "32.7663"
    DailyCost:
      type: object
      required:
        - date
        - total
        - services
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-06-01"
        total:
          type: string
          description: Total cost of the day, as a decimal string.
          example: "4.6809"
        services:
          type: array
          description: Per-group costs, sorted by grouping key.
          items:
            $ref: "#/components/schemas/ServiceCost"
    ServiceCost:
      type: object
      required:
        - key
        - cost
      properties:
        key:
          type: string
          description: >-
            Grouping key: FOCUS ServiceName (groupBy=service), FOCUS
            ServiceProviderName (groupBy=provider), or the allocation label
            (groupBy=allocation; cost matching no rule appears under
            "Unallocated").
          example: Amazon Elastic Compute Cloud
        cost:
          type: string
          description: Cost total, as a decimal string.
          example: "2.4192"
    DailyTokenUsage:
      type: object
      required:
        - date
        - serviceName
        - consumedUnit
        - consumedQuantity
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-05-01"
        serviceName:
          type: string
          description: FOCUS ServiceName.
          example: OpenAI API
        consumedUnit:
          type: string
          description: FOCUS ConsumedUnit (always "Tokens" today).
          example: Tokens
        consumedQuantity:
          type: string
          description: >-
            Total ConsumedQuantity for the day/service/unit, as an exact
            decimal string — never a float.
          example: "1500000"
    DailyUsageMetric:
      type: object
      required:
        - date
        - serviceName
        - serviceTier
        - metricName
        - unit
        - quantity
      properties:
        date:
          type: string
          format: date
          description: The UTC calendar day.
          example: "2026-05-01"
        serviceName:
          type: string
          description: Service or model identity.
          example: claude-opus-4-6
        serviceTier:
          type: string
          description: >-
            Vendor service tier, or "" when the vendor has no tier concept.
          example: priority
        metricName:
          type: string
          description: >-
            Frozen metric identifier (a token_type, "web_search_requests",
            or an opaque line item).
          example: uncached_input_tokens
        unit:
          type: string
          description: 'Frozen unit vocabulary: "Tokens", "Requests", or "Unknown".'
          example: Tokens
        quantity:
          type: string
          description: >-
            Total quantity for the day/service/tier/metric/unit, as an exact
            decimal string — never a float.
          example: "999"
    BusinessMetrics:
      type: object
      required:
        - metrics
      properties:
        metrics:
          type: array
          description: Imported business metrics, sorted by name; never null.
          items:
            $ref: "#/components/schemas/BusinessMetricInfo"
    BusinessMetricInfo:
      type: object
      required:
        - name
        - firstDay
        - lastDay
      properties:
        name:
          type: string
          description: Exact metric identity used by the unit-economics query.
          example: requests served
        firstDay:
          type: string
          format: date
          description: First stored UTC calendar day.
          example: "2026-05-01"
        lastDay:
          type: string
          format: date
          description: Last stored UTC calendar day.
          example: "2026-05-31"
    UnitEconomics:
      type: object
      required:
        - metric
        - currency
        - days
        - period
      properties:
        metric:
          type: string
          example: requests served
        currency:
          type: string
          description: Cost-side BillingCurrency; empty when no cost matched.
          example: USD
        days:
          type: array
          description: Union of cost and metric days, day-ascending.
          items:
            $ref: "#/components/schemas/UnitEconomicsDay"
        period:
          $ref: "#/components/schemas/UnitEconomicsPeriod"
    UnitEconomicsDay:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        cost:
          type: string
          description: Exact daily cost when a cost bin exists; any sign is retained.
        quantity:
          type: string
          description: Exact daily business quantity when a metric bin exists.
        unitCost:
          type: string
          description: >-
            Present only for a covered day. cost / quantity rounded to scale 18
            with round-half-away-from-zero, trailing zeros trimmed. "0" is a
            meaningful rounded result and is not omitted.
    UnitEconomicsPeriod:
      type: object
      required:
        - coveredDays
        - cost
        - quantity
      properties:
        coveredDays:
          type: integer
          minimum: 0
          description: Number of days carrying both cost and positive quantity.
        cost:
          type: string
          description: Exact cost sum over covered days only.
        quantity:
          type: string
          description: Exact quantity sum over covered days only.
        unitCost:
          type: string
          description: >-
            Covered-period cost / quantity at scale 18,
            round-half-away-from-zero; absent when coveredDays is zero.
